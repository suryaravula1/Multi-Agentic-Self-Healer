# Local demo stack: Node.js API + Redis — break it, capture logs, test self-healer.
name: self-healer-demo

services:
  redis:
    image: redis:7-alpine
    container_name: demo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  node-api:
    build:
      context: ./node-service
    container_name: demo-node-api
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: node-api.service
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
