services:
  self-healer:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SELF_HEALER_HOST=0.0.0.0
      - SELF_HEALER_PORT=8080
      - SELF_HEALER_AUTO_EXECUTE=false
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - sandbox-builder

  sandbox-builder:
    build:
      context: .
      dockerfile: docker/sandbox.Dockerfile
    image: self-healer-sandbox:latest
    command: ["true"]
